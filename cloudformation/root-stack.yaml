AWSTemplateFormatVersion: '2010-09-09'
Description: Root stack for environment (PROD/TEST) using nested stacks

Parameters:
  EnvironmentName:
    Type: String

  VpcCidr:
    Type: String
  PublicSubnet1Cidr:
    Type: String
  PublicSubnet2Cidr:
    Type: String
  PrivateSubnet1Cidr:
    Type: String
  PrivateSubnet2Cidr:
    Type: String

  DBName:
    Type: String
  DBUsername:
    Type: String
  DBPassword:
    Type: String
    NoEcho: true
  DBInstanceClass:
    Type: String
  AllocatedStorage:
    Type: Number
  Engine:
    Type: String

Resources:
  VPCStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${AWS::AccountId}-${AWS::Region}-cf-templates/vpc-stack.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        VpcCidr: !Ref VpcCidr
        PublicSubnet1Cidr: !Ref PublicSubnet1Cidr
        PublicSubnet2Cidr: !Ref PublicSubnet2Cidr
        PrivateSubnet1Cidr: !Ref PrivateSubnet1Cidr
        PrivateSubnet2Cidr: !Ref PrivateSubnet2Cidr

  RDSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.amazonaws.com/${AWS::AccountId}-${AWS::Region}-cf-templates/rds-stack.yaml"
      Parameters:
        EnvironmentName: !Ref EnvironmentName
        DBName: !Ref DBName
        DBUsername: !Ref DBUsername
        DBPassword: !Ref DBPassword
        DBInstanceClass: !Ref DBInstanceClass
        AllocatedStorage: !Ref AllocatedStorage
        Engine: !Ref Engine
        PrivateSubnet1Id: !GetAtt VPCStack.Outputs.PrivateSubnet1Id
        PrivateSubnet2Id: !GetAtt VPCStack.Outputs.PrivateSubnet2Id
        VpcId: !GetAtt VPCStack.Outputs.VpcId

Outputs:
  VpcId:
    Value: !GetAtt VPCStack.Outputs.VpcId

  DBEndpoint:
    Value: !GetAtt RDSStack.Outputs.DBEndpoint
