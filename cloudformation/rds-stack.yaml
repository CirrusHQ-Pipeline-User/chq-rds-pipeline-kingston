AWSTemplateFormatVersion: '2010-09-09'
Description: Nested RDS stack

Parameters:
  EnvironmentName:
    Type: String

  DBName:
    Type: String

  DBUsername:
    Type: String

  DBPassword:
    Type: String
    NoEcho: true

  DBInstanceClass:
    Type: String

  AllocatedStorage:
    Type: Number

  Engine:
    Type: String

  PrivateSubnet1Id:
    Type: String

  PrivateSubnet2Id:
    Type: String

  VpcId:
    Type: String

  # NEW — encryption toggle
  StorageEncrypted:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"

  # NEW — optional KMS key
  KmsKeyArn:
    Type: String
    Default: ""

Conditions:
  # Only set KmsKeyId if a key is provided
  UseKmsKey: !Not [ !Equals [ !Ref KmsKeyArn, "" ] ]

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${EnvironmentName} RDS subnet group"
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} RDS SG"
      VpcId: !Ref VpcId

  DBInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: !Ref AllocatedStorage
      Engine: !Ref Engine
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref SecurityGroup
      PubliclyAccessible: false

      # NEW — encryption settings
      StorageEncrypted: !Equals [ !Ref StorageEncrypted, "true" ]
      KmsKeyId: !If
        - UseKmsKey
        - !Ref KmsKeyArn
        - !Ref AWS::NoValue

Outputs:
  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
